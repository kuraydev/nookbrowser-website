name: Deploy to Pages

# Auto-deploys the static landing page to GitHub Pages on every push to main.
#
# Prereq (one-time): repo → Settings → Pages → Source = "GitHub Actions".
# Once that's set, every push here publishes nookbrowser.app. No manual
# "pages-build-deployment" check required.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Skip superseded deploys — one-in-flight at a time.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
