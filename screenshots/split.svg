<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1780 1160" width="1780" height="1160" role="img" aria-label="Split view with two browser panes">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A0D1E"/>
      <stop offset="1" stop-color="#1A0F3A"/>
    </linearGradient>
    <radialGradient id="bloomS" cx="0.5" cy="0" r="0.7">
      <stop offset="0" stop-color="#3A9EFF" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#3A9EFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1780" height="1160" fill="url(#bg)"/>
  <rect width="1780" height="1160" fill="url(#bloomS)"/>

  <g transform="translate(60, 60)">
    <rect width="1660" height="1040" rx="18" fill="#0E1124"/>
    <rect x="0" y="0" width="260" height="1040" rx="18" fill="rgba(255,255,255,0.025)"/>

    <!-- Traffic lights + New tab -->
    <circle cx="28" cy="28" r="6.5" fill="#ff5f57"/>
    <circle cx="50" cy="28" r="6.5" fill="#febc2e"/>
    <circle cx="72" cy="28" r="6.5" fill="#28c840"/>

    <g transform="translate(280, 24)">
      <rect width="1360" height="40" rx="10" fill="rgba(255,255,255,0.03)"/>
      <text x="20" y="24" fill="rgba(255,255,255,0.7)" font-family="-apple-system,SF Pro Text" font-size="12">🔒 Two tabs side-by-side · ⌘⌥\ to toggle</text>
    </g>

    <!-- LEFT PANE -->
    <g transform="translate(280, 80)">
      <rect width="676" height="930" rx="14" fill="#F4F4F7"/>
      <g fill="#333" font-family="-apple-system,SF Pro Display">
        <text x="32" y="60" font-size="18" font-weight="700" fill="#0E1124">Docs · Widevine CDM</text>
        <rect x="32" y="82" width="612" height="4" rx="2" fill="#e5e5eb"/>
        <text x="32" y="124" font-size="13" fill="#333">Installation</text>
        <text x="32" y="148" font-size="12" fill="#666">First launch downloads the component automatically. You do not ship the binary with your app.</text>
        <text x="32" y="196" font-size="13" fill="#333">Configuration</text>
        <text x="32" y="220" font-size="12" fill="#666">await components.whenReady()</text>
        <rect x="32" y="240" width="612" height="140" rx="8" fill="#EFEFF3"/>
        <text x="48" y="266" font-size="11" fill="#888" font-family="SF Mono,Menlo,monospace">// src/main/index.ts</text>
        <text x="48" y="290" font-size="11" fill="#444" font-family="SF Mono,Menlo,monospace">await components.whenReady()</text>
        <text x="48" y="312" font-size="11" fill="#444" font-family="SF Mono,Menlo,monospace">console.log('[widevine]', components.status())</text>
        <text x="48" y="344" font-size="11" fill="#444" font-family="SF Mono,Menlo,monospace">windowManager.create({ primary: true })</text>
        <text x="32" y="410" font-size="13" fill="#333">Signing</text>
        <text x="32" y="434" font-size="12" fill="#666">evs-vmp sign-pkg; codesign --force --deep --sign -</text>
      </g>
    </g>

    <!-- Gutter indicator -->
    <rect x="958" y="80" width="4" height="930" fill="rgba(255,255,255,0.05)"/>

    <!-- RIGHT PANE -->
    <g transform="translate(964, 80)">
      <rect width="676" height="930" rx="14" fill="#1E1E1E"/>
      <g font-family="SF Mono,Menlo,monospace" font-size="11">
        <text x="32" y="48" fill="#888">// src/main/tabManager.ts — content bounds</text>
        <text x="32" y="78" fill="#C678DD">setContentBounds</text>
        <text x="140" y="78" fill="#fff">(bounds: Bounds): </text>
        <text x="264" y="78" fill="#61AFEF">void</text>
        <text x="294" y="78" fill="#fff"> {</text>
        <text x="48" y="100" fill="#fff">this.contentBounds = bounds</text>
        <text x="48" y="122" fill="#fff">this.layoutContent()</text>
        <text x="32" y="144" fill="#fff">}</text>

        <text x="32" y="186" fill="#888">/* layoutContent positions left + split-right */</text>
        <text x="32" y="216" fill="#C678DD">private layoutContent</text>
        <text x="176" y="216" fill="#fff">(): </text>
        <text x="206" y="216" fill="#61AFEF">void</text>
        <text x="236" y="216" fill="#fff"> {</text>
        <text x="48" y="238" fill="#fff">const cb = this.contentBounds</text>
        <text x="48" y="260" fill="#fff">const left = this.tabs.get(this.activeId)</text>
        <text x="48" y="282" fill="#fff">const right = this.splitRightId</text>
        <text x="48" y="304" fill="#fff">  ? this.tabs.get(this.splitRightId)</text>
        <text x="48" y="326" fill="#fff">  : null</text>
        <text x="48" y="358" fill="#fff">if (right?.view &amp;&amp; left?.view) {</text>
        <text x="64" y="380" fill="#fff">const half = Math.floor(cb.width / 2) - 1</text>
        <text x="64" y="402" fill="#fff">left.view.setBounds({ x: cb.x, ... })</text>
        <text x="64" y="424" fill="#fff">right.view.setBounds({ x: cb.x+half+2, ... })</text>
        <text x="48" y="446" fill="#fff">} else if (left?.view) {</text>
        <text x="64" y="468" fill="#fff">left.view.setBounds(cb)</text>
        <text x="48" y="490" fill="#fff">}</text>
        <text x="32" y="512" fill="#fff">}</text>

        <text x="32" y="560" fill="#98C379"> ✓ tests 139 passing</text>
      </g>
    </g>

    <!-- Badge -->
    <g transform="translate(280, 1020)">
      <rect x="0" y="0" width="180" height="22" rx="11" fill="rgba(58,158,255,0.14)" stroke="rgba(58,158,255,0.35)"/>
      <text x="90" y="15" text-anchor="middle" fill="rgba(179,216,255,0.95)" font-family="SF Mono,Menlo,monospace" font-size="11" font-weight="600">SPLIT VIEW · ⌘⌥\</text>
    </g>
  </g>
</svg>
