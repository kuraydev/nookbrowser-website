<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1780 1160" width="1780" height="1160" role="img" aria-label="Shield popover showing blocked trackers">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A0D1E"/>
      <stop offset="1" stop-color="#1A0F3A"/>
    </linearGradient>
    <radialGradient id="bloomR" cx="1" cy="0" r="0.6">
      <stop offset="0" stop-color="#3A9EFF" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#3A9EFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="brandH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF5188"/>
      <stop offset="0.5" stop-color="#C75CEB"/>
      <stop offset="1" stop-color="#3A9EFF"/>
    </linearGradient>
  </defs>
  <rect width="1780" height="1160" fill="url(#bg)"/>
  <rect width="1780" height="1160" fill="url(#bloomR)"/>

  <g transform="translate(60,60)">
    <rect width="1660" height="1040" rx="18" fill="#0E1124"/>

    <!-- topbar -->
    <g transform="translate(280, 24)" font-family="-apple-system,SF Pro Text">
      <rect width="1360" height="40" rx="10" fill="rgba(255,255,255,0.03)"/>
      <circle cx="20" cy="20" r="10" fill="rgba(255,255,255,0.06)"/>
      <circle cx="48" cy="20" r="10" fill="rgba(255,255,255,0.06)"/>
      <circle cx="76" cy="20" r="10" fill="rgba(255,255,255,0.06)"/>
      <rect x="110" y="8" width="820" height="24" rx="12" fill="rgba(255,255,255,0.06)"/>
      <text x="130" y="24" fill="rgba(255,255,255,0.7)" font-size="12">🔒 https://news.ycombinator.com</text>

      <!-- Shield pill in toolbar -->
      <g transform="translate(960, 6)">
        <rect x="0" y="0" width="96" height="28" rx="14" fill="rgba(74,222,128,0.14)" stroke="rgba(74,222,128,0.45)"/>
        <g transform="translate(10, 6)" stroke="rgba(74,222,128,0.95)" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 0 L16 4 v6 c0 5 -3 8 -8 9 -5 -1 -8 -4 -8 -9 V4 z"/>
        </g>
        <text x="36" y="18" fill="rgba(74,222,128,0.95)" font-size="12" font-weight="700">3,214</text>
      </g>
    </g>

    <!-- Sidebar faint -->
    <rect x="0" y="0" width="260" height="1040" rx="18" fill="rgba(255,255,255,0.025)"/>

    <!-- Fake page content below -->
    <g transform="translate(280, 80)" fill="rgba(255,255,255,0.07)">
      <rect x="0" y="0" width="1360" height="930" rx="14"/>
      <rect x="40"  y="40" width="1280" height="20" rx="5"/>
      <rect x="40"  y="80" width="1000" height="12" rx="4"/>
      <rect x="40" y="110" width="1200" height="12" rx="4"/>
      <rect x="40" y="140" width="900"  height="12" rx="4"/>
      <rect x="40" y="180" width="1280" height="20" rx="5"/>
      <rect x="40" y="220" width="1000" height="12" rx="4"/>
      <rect x="40" y="250" width="1200" height="12" rx="4"/>
    </g>

    <!-- Popover -->
    <g transform="translate(1180, 80)">
      <rect width="360" height="440" rx="14" fill="#151030" stroke="rgba(255,255,255,0.12)"/>
      <!-- header -->
      <g transform="translate(16, 16)" font-family="-apple-system,SF Pro Text">
        <g transform="translate(0, 4)" stroke="rgba(74,222,128,0.95)" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 0 L20 5 v7 c0 6 -4 10 -10 11 -6 -1 -10 -5 -10 -11 V5 z"/>
        </g>
        <text x="34" y="16" fill="#fff" font-size="14" font-weight="600">Shield</text>
        <text x="34" y="32" fill="rgba(255,255,255,0.5)" font-size="11">Active for news.ycombinator.com</text>
      </g>
      <line x1="0" y1="64" x2="360" y2="64" stroke="rgba(255,255,255,0.08)"/>

      <!-- Big stat -->
      <text x="180" y="116" text-anchor="middle" fill="#fff" font-family="-apple-system,SF Pro Display" font-size="44" font-weight="800" letter-spacing="-1.5">3,214</text>
      <text x="180" y="140" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-family="-apple-system,SF Pro Text" font-size="12">trackers + ads blocked this week</text>

      <!-- Row items -->
      <g transform="translate(16, 170)" font-family="-apple-system,SF Pro Text" font-size="12">
        <g>
          <rect width="328" height="40" rx="9" fill="rgba(74,222,128,0.08)" stroke="rgba(74,222,128,0.2)"/>
          <circle cx="18" cy="20" r="7" fill="none" stroke="rgba(74,222,128,0.85)" stroke-width="1.5"/>
          <circle cx="18" cy="20" r="3" fill="rgba(74,222,128,0.85)"/>
          <text x="36" y="17" fill="#fff" font-weight="600">Ads</text>
          <text x="36" y="30" fill="rgba(255,255,255,0.55)" font-size="10.5">EasyList</text>
          <rect x="280" y="10" width="36" height="20" rx="10" fill="rgba(74,222,128,0.85)"/>
          <circle cx="306" cy="20" r="8" fill="white"/>
        </g>
        <g transform="translate(0, 50)">
          <rect width="328" height="40" rx="9" fill="rgba(74,222,128,0.08)" stroke="rgba(74,222,128,0.2)"/>
          <circle cx="18" cy="20" r="7" fill="none" stroke="rgba(74,222,128,0.85)" stroke-width="1.5"/>
          <circle cx="18" cy="20" r="3" fill="rgba(74,222,128,0.85)"/>
          <text x="36" y="17" fill="#fff" font-weight="600">Trackers</text>
          <text x="36" y="30" fill="rgba(255,255,255,0.55)" font-size="10.5">EasyPrivacy</text>
          <rect x="280" y="10" width="36" height="20" rx="10" fill="rgba(74,222,128,0.85)"/>
          <circle cx="306" cy="20" r="8" fill="white"/>
        </g>
        <g transform="translate(0, 100)">
          <rect width="328" height="40" rx="9" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)"/>
          <circle cx="18" cy="20" r="7" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
          <text x="36" y="17" fill="#fff" font-weight="600">Cookie banners</text>
          <text x="36" y="30" fill="rgba(255,255,255,0.4)" font-size="10.5">Fanboy (opt-in)</text>
          <rect x="280" y="10" width="36" height="20" rx="10" fill="rgba(255,255,255,0.08)"/>
          <circle cx="292" cy="20" r="8" fill="rgba(255,255,255,0.4)"/>
        </g>
      </g>

      <!-- Per-site toggle -->
      <g transform="translate(16, 330)" font-family="-apple-system,SF Pro Text" font-size="12">
        <rect width="328" height="48" rx="10" fill="rgba(255,81,136,0.08)" stroke="rgba(255,81,136,0.22)"/>
        <text x="14" y="20" fill="#fff" font-weight="600">Block on news.ycombinator.com</text>
        <text x="14" y="36" fill="rgba(255,255,255,0.55)" font-size="10.5">Turn off to load everything on this site.</text>
        <rect x="278" y="14" width="36" height="20" rx="10" fill="url(#brandH)"/>
        <circle cx="304" cy="24" r="8" fill="white"/>
      </g>
      <text x="16" y="412" fill="rgba(255,255,255,0.45)" font-family="-apple-system,SF Pro Text" font-size="10.5">Reset stats</text>
    </g>
  </g>
</svg>
