<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1780 1160" width="1780" height="1160" role="img" aria-label="Space menu with color and theme pickers">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A0D1E"/>
      <stop offset="1" stop-color="#1A0F3A"/>
    </linearGradient>
    <radialGradient id="bloomL" cx="0.1" cy="0.05" r="0.6">
      <stop offset="0" stop-color="#FF5188" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#FF5188" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF5188"/>
      <stop offset="0.5" stop-color="#C75CEB"/>
      <stop offset="1" stop-color="#3A9EFF"/>
    </linearGradient>
    <linearGradient id="sunset" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF5188"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="ocean" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3A9EFF"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="forest" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4ADE80"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="candy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF5188"/>
      <stop offset="0.5" stop-color="#C75CEB"/>
      <stop offset="1" stop-color="#3A9EFF"/>
    </linearGradient>
    <linearGradient id="lava" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F43F5E"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="night" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#1E1B4B"/>
    </linearGradient>
  </defs>
  <rect width="1780" height="1160" fill="url(#bg)"/>
  <rect width="1780" height="1160" fill="url(#bloomL)"/>

  <!-- Dimmed window behind menu -->
  <g transform="translate(60,60)" opacity="0.55">
    <rect width="1660" height="1040" rx="18" fill="#0E1124"/>
    <rect x="0" y="0" width="260" height="1040" rx="18" fill="rgba(255,255,255,0.025)"/>
  </g>

  <!-- Sharp sidebar in the foreground to anchor the menu -->
  <g transform="translate(60,60)">
    <rect x="0" y="0" width="260" height="1040" rx="18" fill="rgba(255,255,255,0.025)"/>

    <!-- Space dock at bottom with the one being edited ringed -->
    <g transform="translate(16, 972)">
      <rect x="0" y="0" width="36" height="36" rx="10" fill="rgba(255,81,136,0.22)" stroke="#FF5188" stroke-width="2"/>
      <text x="18" y="24" text-anchor="middle" font-family="-apple-system,system-ui" font-size="16">🏠</text>
      <rect x="44" y="0" width="36" height="36" rx="10" fill="rgba(58,158,255,0.14)"/>
      <text x="62" y="24" text-anchor="middle" font-family="-apple-system,system-ui" font-size="16">💼</text>
      <rect x="88" y="0" width="36" height="36" rx="10" fill="rgba(74,222,128,0.14)"/>
      <text x="106" y="24" text-anchor="middle" font-family="-apple-system,system-ui" font-size="16">🧠</text>
    </g>
  </g>

  <!-- Space menu floating over the sidebar -->
  <g transform="translate(80, 390)">
    <rect x="0" y="0" width="340" height="560" rx="14" fill="#151030" stroke="rgba(255,255,255,0.12)"/>
    <!-- header -->
    <g transform="translate(16, 16)">
      <rect x="0" y="0" width="28" height="28" rx="8" fill="rgba(255,81,136,0.22)" stroke="rgba(255,81,136,0.4)"/>
      <text x="14" y="20" text-anchor="middle" font-family="-apple-system,system-ui" font-size="14">🏠</text>
      <text x="40" y="14" fill="#fff" font-family="-apple-system,SF Pro Text" font-size="14" font-weight="600">Personal</text>
      <text x="40" y="28" fill="rgba(255,255,255,0.45)" font-family="-apple-system,SF Pro Text" font-size="11">Space settings</text>
      <rect x="300" y="2" width="24" height="24" rx="6" fill="none"/>
      <path d="M305 7 L319 21 M319 7 L305 21" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <line x1="0" y1="56" x2="340" y2="56" stroke="rgba(255,255,255,0.08)"/>

    <!-- Rename row -->
    <g transform="translate(12, 72)" font-family="-apple-system,SF Pro Text">
      <rect width="316" height="34" rx="9" fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.08)"/>
      <text x="14" y="22" fill="#fff" font-size="13">Personal</text>
      <text x="274" y="22" fill="rgba(255,255,255,0.5)" font-size="10">Rename</text>
    </g>

    <!-- Theme row -->
    <g transform="translate(12, 116)" font-family="-apple-system,SF Pro Text">
      <rect width="316" height="54" rx="11" fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.08)"/>
      <rect x="12" y="10" width="34" height="34" rx="8" fill="url(#sunset)"/>
      <text x="58" y="26" fill="#fff" font-size="13" font-weight="600">Theme · Sunset</text>
      <text x="58" y="42" fill="rgba(255,255,255,0.5)" font-size="10.5">Two-stop gradient</text>
      <path d="M296 22 L302 28 L296 34" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.6" stroke-linecap="round"/>
    </g>
    <!-- Icon row -->
    <g transform="translate(12, 180)" font-family="-apple-system,SF Pro Text">
      <rect width="316" height="54" rx="11" fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.08)"/>
      <rect x="12" y="10" width="34" height="34" rx="8" fill="rgba(255,81,136,0.1)" stroke="rgba(255,255,255,0.08)"/>
      <text x="29" y="32" text-anchor="middle" font-family="-apple-system,system-ui" font-size="15">🏠</text>
      <text x="58" y="26" fill="#fff" font-size="13" font-weight="600">Icon · Home</text>
      <text x="58" y="42" fill="rgba(255,255,255,0.5)" font-size="10.5">🏠 — custom emoji</text>
      <path d="M296 22 L302 28 L296 34" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.6" stroke-linecap="round"/>
    </g>

    <!-- Theme grid preview -->
    <text x="12" y="258" fill="rgba(255,255,255,0.45)" font-family="-apple-system,system-ui" font-size="10" font-weight="600" letter-spacing="1.4">THEME PRESETS</text>
    <g transform="translate(12, 268)" font-family="-apple-system,SF Pro Text">
      <rect x="0"   y="0"  width="100" height="58" rx="10" fill="url(#sunset)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
      <text x="10" y="48" fill="#fff" font-size="12" font-weight="700">Sunset</text>
      <rect x="108" y="0"  width="100" height="58" rx="10" fill="url(#ocean)" stroke="rgba(255,255,255,0.1)"/>
      <text x="118" y="48" fill="#fff" font-size="12" font-weight="700">Ocean</text>
      <rect x="216" y="0"  width="100" height="58" rx="10" fill="url(#forest)" stroke="rgba(255,255,255,0.1)"/>
      <text x="226" y="48" fill="#fff" font-size="12" font-weight="700">Forest</text>

      <rect x="0"   y="66" width="100" height="58" rx="10" fill="url(#candy)" stroke="rgba(255,255,255,0.1)"/>
      <text x="10" y="114" fill="#fff" font-size="12" font-weight="700">Candy</text>
      <rect x="108" y="66" width="100" height="58" rx="10" fill="url(#lava)" stroke="rgba(255,255,255,0.1)"/>
      <text x="118" y="114" fill="#fff" font-size="12" font-weight="700">Lava</text>
      <rect x="216" y="66" width="100" height="58" rx="10" fill="url(#night)" stroke="rgba(255,255,255,0.1)"/>
      <text x="226" y="114" fill="#fff" font-size="12" font-weight="700">Night</text>
    </g>

    <line x1="0" y1="408" x2="340" y2="408" stroke="rgba(255,255,255,0.08)"/>

    <!-- Sleep mode row -->
    <text x="16" y="430" fill="rgba(255,255,255,0.5)" font-family="-apple-system,SF Pro Text" font-size="11.5" font-weight="600">Auto-sleep tabs</text>
    <text x="260" y="430" fill="rgba(255,255,255,0.4)" font-family="-apple-system,SF Pro Text" font-size="10.5">~5 min idle</text>
    <g transform="translate(16, 440)">
      <rect width="308" height="30" rx="15" fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.08)"/>
      <rect x="2" y="2" width="101" height="26" rx="14" fill="rgba(255,255,255,0.05)"/>
      <text x="52" y="19" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="-apple-system,SF Pro Text" font-size="11" font-weight="600">Never</text>
      <rect x="104" y="2" width="101" height="26" rx="14" fill="rgba(255,255,255,0.05)"/>
      <text x="154" y="19" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="-apple-system,SF Pro Text" font-size="11" font-weight="600">Default</text>
      <rect x="205" y="2" width="101" height="26" rx="14" fill="url(#brand)"/>
      <text x="255" y="19" text-anchor="middle" fill="#fff" font-family="-apple-system,SF Pro Text" font-size="11" font-weight="600">Aggressive</text>
    </g>
    <line x1="0" y1="498" x2="340" y2="498" stroke="rgba(255,255,255,0.08)"/>
    <!-- Delete row -->
    <g transform="translate(90, 512)" font-family="-apple-system,SF Pro Text" font-size="12">
      <rect width="160" height="32" rx="8" fill="none" stroke="rgba(255,81,136,0.35)"/>
      <text x="80" y="21" text-anchor="middle" fill="#FF5188" font-weight="600">Delete space</text>
    </g>
  </g>

  <!-- Caption -->
  <text x="890" y="940" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="-apple-system,SF Pro Text" font-size="14">Right-click any space pill → full control without leaving the sidebar.</text>
</svg>
