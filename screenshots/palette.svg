<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1780 1160" width="1780" height="1160" role="img" aria-label="Command palette with fuzzy results">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A0D1E"/>
      <stop offset="1" stop-color="#1A0F3A"/>
    </linearGradient>
    <radialGradient id="bloomC" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0" stop-color="#C75CEB" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#C75CEB" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF5188"/>
      <stop offset="0.5" stop-color="#C75CEB"/>
      <stop offset="1" stop-color="#3A9EFF"/>
    </linearGradient>
  </defs>
  <rect width="1780" height="1160" fill="url(#bg)"/>
  <rect width="1780" height="1160" fill="url(#bloomC)"/>

  <!-- Dimmed / blurred background window -->
  <g opacity="0.35" transform="translate(60, 60)">
    <rect width="1660" height="1040" rx="18" fill="#0E1124"/>
    <rect x="0" y="0" width="260" height="1040" rx="18" fill="rgba(255,255,255,0.04)"/>
  </g>
  <rect width="1780" height="1160" fill="rgba(10,13,30,0.55)"/>

  <!-- Palette panel -->
  <g transform="translate(570, 180)">
    <rect width="640" height="540" rx="16" fill="#151030" stroke="rgba(255,255,255,0.12)"/>
    <!-- Search input -->
    <g transform="translate(16, 16)" font-family="-apple-system,SF Pro Text">
      <g fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.8" stroke-linecap="round">
        <circle cx="10" cy="12" r="7"/>
        <path d="M16 18 L22 24"/>
      </g>
      <text x="40" y="24" fill="#fff" font-size="17" font-weight="500">shie</text>
      <rect x="36" y="6" width="2" height="24" fill="#FF5188"/>
      <g transform="translate(540, 4)">
        <rect width="60" height="26" rx="7" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)"/>
        <text x="30" y="18" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-family="SF Mono,Menlo,monospace" font-size="11">Esc</text>
      </g>
    </g>
    <line x1="0" y1="56" x2="640" y2="56" stroke="rgba(255,255,255,0.08)"/>

    <!-- Results -->
    <g font-family="-apple-system,SF Pro Text" transform="translate(8, 68)">
      <!-- selected row -->
      <g>
        <rect x="0" y="0" width="624" height="44" rx="8" fill="rgba(255,255,255,0.08)"/>
        <g transform="translate(14, 14)" fill="none" stroke="#fff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 0 L16 4 v6 c0 5 -3 8 -8 9 -5 -1 -8 -4 -8 -9 V4 z"/>
        </g>
        <text x="42" y="20" fill="#fff" font-size="13.5" font-weight="600">Shield</text>
        <text x="42" y="36" fill="rgba(255,255,255,0.55)" font-size="11" font-family="SF Mono,Menlo,monospace">Toggle shield for current site</text>
        <g transform="translate(600, 18)" fill="#FF5188" stroke="#FF5188" stroke-width="2">
          <path d="M0 4 L8 4 M5 0 L10 4 L5 8" fill="none" stroke-linecap="round"/>
        </g>
      </g>
      <!-- tabs -->
      <g transform="translate(0, 52)"><rect width="624" height="44" rx="8" fill="transparent"/><rect x="14" y="14" width="14" height="14" rx="3" fill="#FF0000"/><text x="42" y="20" fill="#fff" font-size="13.5" font-weight="500">Switch to tab: YouTube — Led Zeppelin</text><text x="42" y="36" fill="rgba(255,255,255,0.5)" font-size="11" font-family="SF Mono,Menlo,monospace">youtube.com/watch?v=BL-W1tw7n4U</text></g>
      <g transform="translate(0, 104)"><rect width="624" height="44" rx="8" fill="transparent"/><rect x="12" y="12" width="18" height="18" rx="4" fill="rgba(255,255,255,0.08)"/><text x="15" y="25" font-family="-apple-system,system-ui" font-size="12">⚙️</text><text x="42" y="20" fill="#fff" font-size="13.5" font-weight="500">Open Settings → Shield</text><text x="42" y="36" fill="rgba(255,255,255,0.5)" font-size="11" font-family="SF Mono,Menlo,monospace">Per-site exceptions, filter lists</text></g>
      <g transform="translate(0, 156)"><rect width="624" height="44" rx="8" fill="transparent"/><rect x="14" y="14" width="14" height="14" rx="3" fill="rgba(255,255,255,0.08)"/><text x="42" y="20" fill="#fff" font-size="13.5" font-weight="500">Bookmark: Ghostery</text><text x="42" y="36" fill="rgba(255,255,255,0.5)" font-size="11" font-family="SF Mono,Menlo,monospace">ghostery.com</text></g>
      <g transform="translate(0, 208)"><rect width="624" height="44" rx="8" fill="transparent"/><rect x="14" y="14" width="14" height="14" rx="3" fill="rgba(255,255,255,0.08)"/><text x="42" y="20" fill="#fff" font-size="13.5" font-weight="500">History: EasyList filter docs</text><text x="42" y="36" fill="rgba(255,255,255,0.5)" font-size="11" font-family="SF Mono,Menlo,monospace">easylist.to/docs</text></g>
      <g transform="translate(0, 260)"><rect width="624" height="44" rx="8" fill="transparent"/><rect x="12" y="12" width="18" height="18" rx="4" fill="rgba(255,255,255,0.08)"/><text x="42" y="20" fill="#fff" font-size="13.5" font-weight="500">Action: Reset Shield stats</text><text x="42" y="36" fill="rgba(255,255,255,0.5)" font-size="11" font-family="SF Mono,Menlo,monospace">Clears counter — no pages affected</text></g>
    </g>

    <!-- Footer hints -->
    <line x1="0" y1="500" x2="640" y2="500" stroke="rgba(255,255,255,0.06)"/>
    <g transform="translate(16, 513)" font-family="SF Mono,Menlo,monospace" font-size="10" fill="rgba(255,255,255,0.5)">
      <rect x="0" y="0" width="22" height="18" rx="4" fill="rgba(255,255,255,0.06)"/>
      <text x="11" y="13" text-anchor="middle">↑↓</text>
      <text x="30" y="13">navigate</text>
      <rect x="100" y="0" width="22" height="18" rx="4" fill="rgba(255,255,255,0.06)"/>
      <text x="111" y="13" text-anchor="middle">↵</text>
      <text x="128" y="13">open</text>
      <g transform="translate(580, 2)"><text text-anchor="end" x="40" y="11">⌘K</text></g>
    </g>
  </g>
</svg>
